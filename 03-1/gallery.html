<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .galleryWrap * {
      user-select: none;
    }
  </style>
</head>

<body>
  <div class="galleryWrap">
    <h1>이미지넘기기</h1>
    <a href="#" onclick="prev()">&lt;</a>
    <img src="img/img1.jpg" alt="" width="300" height="200" id="pic">
    <a href="#" onclick="next()">&gt;</a>
  </div>
  <script>
    let num = 1;
    let a = document.querySelector('#pic');
    function prev() {
      num--;
      if (num < 1) { num = 7 }
      a.src = `img/img${num}.jpg`
      console.log(a.src);
    }

    function next() {
      num++;
      if (num > 7) { num = 1 }
      //let a = document.querySelector('#pic');
      a.src = `img/img${num}.jpg`
      console.log(a.src);

    }

  </script>
</body>

</html>
