<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .item {
      width: 200px;
      height: 100px;
      background: url(./imgs/bg.jpg);
      color: white;
      text-align: center;
      line-height: 100px;
      cursor: pointer;
      transition-property: transform;
      transition-duration: 1s;
      transition-timing-function: linear(0, 0.223 11.7%, 0.392 18.4%, 0.619 24.8%, 0.999 33.3%, 0.748 40%, 0.691 42.7%, 0.672 45.3%, 0.69 47.8%, 0.743 50.4%, 0.999 57.7%, 0.883 61.8%, 0.856 63.6%, 0.848 65.3%, 0.855 67%, 0.879 68.8%, 0.999 74.5%, 0.953 77.5%, 0.94 80.2%, 0.95 82.7%, 1 88.2%, 0.987 91.9%, 1);
    }

    .item:hover {
      transform: scale(1.2);
    }

    .item:hover+.drop {
      /* display: block; */
      opacity: 1;
    }

    .drop {
      width: 100px;
      height: 100px;
      background: url(./imgs/14.jpg);
      /* display: none; */
      opacity: 0;
      transition-property: opacity;
      transition-duration: 1s;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="item">Hover Me</div>
    <div class="drop"></div>
  </div>
</body>

</html>
