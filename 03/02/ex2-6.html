<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>id 선택자</title>
  <style>
    p {
      color: #ff0000;
    }
    .tea{
      color:#0000ff;
    }
    #tea {
      color: #0000ff;
    }

    #food {
      color: #00ff00;
    }
  </style>
</head>

<body>
  <p>우리를 <span class="tea">기쁘게</span> 하는 것들</p>
  <p id="tea">건강에 좋은 차</p>
  <p id="food">머리가 좋아지는 음식</p>
</body>

</html>
