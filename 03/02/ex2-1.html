<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* 1. internel : 내부스타일시트*/
    h1 {
      color: red;
    }
  </style>
  <!-- 3. externel : 외부스타일시트 -->
  <!-- 4. @import  -->
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <h1>css를 적용하는 방법</h1>
  <!-- 2. inline : 쓰면 안됨-->
  <h1 style="color:blue">css를 적용하는 방법</h1>
  <h2>css문서에 css문서를 연결하기 @import</h2>
</body>

</html>
