<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>하위(자손)선택자</title>
  <style>
    .blue_text ul{
      border:1px solid red;
    }
    .blue_text p {
      color:blue;
    }
    /* 하위 선택자를 사용해서 li 의 글씨색을 파랑으로 변경 */
    .blue_text ul li{
      color:blue;
    }
    /* .blue_text의 배경색을 하위선택자를 사용해서 변경해보세요 */
    body .blue_text{
      background: skyblue;
    }
  </style>
</head>

<body>
  <div class="blue_text">
    <p>7월의 여행지</p>
    <p>8월의 여행지</p>
    <ul>
      <li>1주차 여행지</li>
      <li>2주차 여행지</li>
    </ul>
  </div>
  <p>내년의 여행지</p>
</body>

</html>
