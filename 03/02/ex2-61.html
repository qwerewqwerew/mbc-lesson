<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .fade {
      height: 300px;
      background: url('imgs/lotus.png') no-repeat center / cover;
      /* vendor prefix: 제조사 접두어 - 표준 확정전 브라우저에서 개발한 신기능 */
      -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent);
      mask-image: linear-gradient(to bottom, black 60%, transparent);
      /* -webkit-: 크롬,엣지,사파리,오페라
         -o-  :구 오페라
        -moz- :파이어폭스
      */
    }
  </style>
</head>

<body>
  <div class="fade"></div>
</body>

</html>
