<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>형제선택자</title>
  <style>
    .title~p {
      background: skyblue;
    }
    .title~p+p{
      color:white;
      background: red;
    }
  </style>
</head>

<body>
  <p class="title">엑스포 안내</p>
  <p>책자를 배부하고 있습니다.</p>
  <p>8월의 여행지</p>
  <p>9월의 여행지</p>
  <ul>
    <li>
      <p>주중에는 정오 이벤트가 있습니다</p>
    </li>
    <li>
      <p>주말에는 자정 이벤트가 있습니다</p>
    </li>
  </ul>
  <p>9월에는 가을 이벤트가 시작됩니다</p>
</body>

</html>
