<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <title>테두리 이미지</title>
  <style>
    body {
      margin: 20px;
    }

    div {
      width: 600px;
      height: 50px;
      padding: 15px;
      border: 20px solid transparent;
    }

    .round {
      border-image: url('./imgs/border.png') 20;
      border-image: linear-gradient(blue, pink) 27;
      /* border-radius: 40px; */
    }

    .repeat {
      border-image: url('./imgs/border.png') 20 repeat;
    }

    .stretch {
      border-image: url('./imgs/border.png') 20 stretch;
    }
  </style>
</head>

<body>
  <div class="round"> It's impossible not only starting good but also keeping it firm!!</div>
  <div class="repeat"> It's impossible not only starting good but also keeping it firm!!</div>
  <div class="stretch"> It's impossible not only starting good but also keeping it firm!!</div>
</body>

</html>
