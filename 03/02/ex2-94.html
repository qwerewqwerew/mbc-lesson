<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>16:9 반응형 영상</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    .video {
      aspect-ratio: 16/9;
    }

    .video video {
      width: 100%;
      height: 100%;
    }

    .container {
      width: 200px;
      height: 400px;
      filter: drop-shadow(2px 2px 10px #000);
      /* box-shadow: 2px 2px 10px #ff0000; */
    }

    img {
      width: 100%;
      height: 100%;
    }

    .fill {
      object-fit: fill;
      /* 이미지의 비율을 유지하지 않고 요소에 꽉 차게 채움 */
    }

    .contain {
      /* 이미지의 비율을 유지. 이미지 안잘림 */
      object-fit: contain;
    }

    .cover {
      /* 이미지의 비율을 유지 채움. 이미지 잘림 */
      object-fit: cover;
    }

    .none {
      /* 이미지의 원래 크기 유지 */
      object-fit: none;
    }

    .scale-down {
      /* cover , contain 중 작은쪽 사용 */
      object-fit: scale-down;
    }

    .container {
      display: inline-block;
    }
  </style>
</head>

<body>
  <div class="video">
    <video src="./imgs/video.mp4" autoplay></video>
  </div>
  <div class="container">
    <img src="./imgs/rhino.jpg" alt="고양이" class="fill">
    <h3>object-fit: fill</h3>
  </div>
  <div class="container">
    <img src="./imgs/rhino.jpg" alt="고양이" class="contain">
    <h3>object-fit: contain</h3>
  </div>
  <div class="container">
    <img src="./imgs/rhino.jpg" alt="고양이" class="cover">
    <h3>object-fit: cover</h3>
  </div>
  <div class="container">
    <img src="./imgs/rhino.jpg" alt="고양이" class="none">
    <h3>object-fit: none</h3>
  </div>
  <div class="container">
    <img src="./imgs/rhino.jpg" alt="고양이" class="scale-down">
    <h3>object-fit: scale-down</h3>
  </div>
</body>

</html>
