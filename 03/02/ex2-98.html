<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .card-container {
      perspective: 1000px;
    }

    .card {
      width: 200px;
      height: 300px;
      transition: all 0.6s;
      transform-style: preserve-3d;
      position: relative;
    }

    .front,
    .back {
      position: absolute;
      background: #3498db;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
    }

    .card:hover {
      transform: rotateY(180deg);
    }

    .back {
      /* https://grabient.com/HQRgnADANKAsIxAVgMwxQNmsATBtoAHGDBgOwLBIgHXQjAZgkNk5oNMhA?style=linearSwatches */
      background: linear-gradient(90deg, #141916 0.000%, #141916 7.692%, #332b22 calc(7.692% + 1px), #332b22 15.385%, #533c2f calc(15.385% + 1px), #533c2f 23.077%, #6e4c3b calc(23.077% + 1px), #6e4c3b 30.769%, #825946 calc(30.769% + 1px), #825946 38.462%, #8b624f calc(38.462% + 1px), #8b624f 46.154%, #8a6654 calc(46.154% + 1px), #8a6654 53.846%, #7e6657 calc(53.846% + 1px), #7e6657 61.538%, #686256 calc(61.538% + 1px), #686256 69.231%, #4c5852 calc(69.231% + 1px), #4c5852 76.923%, #2c4b4b calc(76.923% + 1px), #2c4b4b 84.615%, #0c3b41 calc(84.615% + 1px), #0c3b41 92.308%, #002a36 calc(92.308% + 1px) 100.000%);
      transform: rotateY(180deg);
    }
  </style>
</head>

<body>
  <div class="card-container">
    <div class="card">
      <div class="front">Front</div>
      <div class="back">Back</div>
    </div>
  </div>
</body>

</html>
