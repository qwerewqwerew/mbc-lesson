<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    table,
    td,
    th {
      border: 1px solid;
    }
    thead,tfoot{
      background: #ebebeb;
    }
  </style>
  <link rel="stylesheet" href="../02/style.css">
</head>

<body>
  <h1><img src="./img/07.png" alt="샴푸레시피타이틀"></h1>
  <!-- 10 x 4 -->
  <table>
    <caption>레시피 재료</caption>
    <thead>
      <tr>
        <th>재료 </th>
        <th>첨가량</th>
        <th>48시간</th>
        <th>대체재료</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <th rowspan="5">수상층 </td>
        <td>로즈마리 추출물</td>
        <td>30g </td>
        <td rowspan="3">증류수</td>
      </tr> <!-- //1tr -->
      <tr>
        <td>네틀추출물</td>
        <td>30g </td>
      </tr> <!-- //2tr -->
      <tr>
        <td>증류수</td>
        <td>90g </td>
      </tr> <!-- //3tr -->
      <tr>
        <td>폴리쿼터</td>
        <td>1.5g </td>
        <td>쟁탄검</td>
      </tr> <!-- //4tr -->
      <tr>
        <td>글리세린</td>
        <td>10g </td>
        <td>히아루론산 10g</td>
      </tr> <!-- //5tr -->
      <tr>
        <th rowspan="3">계면 활성제</th>
        <td>LES/ CDE</td>
        <td>180g / 10g</td>
        <td>CDE + LES</td>
      </tr> <!-- //6tr -->
      <tr>
        <td>LES/ CDE</td>
        <td>180g / 10g</td>
        <td>CDE + LES</td>
      </tr> <!-- //7tr -->
      <tr>
        <td>LES/ CDE</td>
        <td>180g / 10g</td>
        <td>CDE + LES</td>
      </tr> <!-- //8tr -->
    </tbody>
    <tfoot>
      <tr>
        <td colspan="4">좋은 향을 위해서면 엘라스틴향 사용 추천</td>
      </tr>
    </tfoot>
  </table>
</body>

</html>
