<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>셀병합하기</title>
  <style>
    table,
    tr,
    td,
    th {
      border: 1px solid;
    }
  </style>
</head>

<body>
  <!-- 2행 3열의 표를 만드세요 -->
  <!-- table>(tr>td*3)*2 -->
  <table>
    <tr>
      <td colspan="3">1</td>
    </tr>
    <tr>
      <td>2</td>
      <td>3</td>
      <td>4</td>
    </tr>
  </table>
  <hr>
  <!-- 3행3열 -->
  <!-- table>(tr>td*3)*3 -->
  <table>
    <tr>
      <td rowspan="3">1</td>
      <td>2</td>
      <td>3</td>
    </tr>
    <tr>
      <td>4</td>
      <td>5</td>
    </tr>
    <tr>
      <td>6</td>
      <td>7</td>
    </tr>
  </table>
  <hr>
</body>

</html>
