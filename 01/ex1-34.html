<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>div</title>
    <!-- 웹표준 html5, css3, es6 -->
    <style>
      .wrap {
        width: 300px;
        margin: auto;
        background-color: antiquewhite;
      }
      footer,
      section,
      header {
        border: 1px solid;
      }
    </style>
  </head>
  <!-- ❌ 틀린 부분: </head> 닫는 태그가 누락되었었습니다. -->
  <body>
    <!-- header+section+footer -->
    <!-- .,# -->
    <div class="wrap">
      <header>헤더</header>
      <section>
        <h2>semantic 태그</h2>
        섹션
      </section>
      <footer>푸터</footer>
    </div>
    <!-- ❌ 틀린 부분: <div class="wrap">을 닫는 </div> 태그가 누락되었었습니다. -->
  </body>
</html>
